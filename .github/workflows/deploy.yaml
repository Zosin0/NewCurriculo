name: Deploy Angular Lib

on:
  push:
    branches:
      - "deploy-lib"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: NPM install
        run: npm ci

      - name: Build Angular
        run: npm run build -- --configuration production

      - name: Copy dist folder to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VMIP }}
          username: ${{ secrets.VMUSS }}
          key: ${{ secrets.VMPSS }}
          port: ${{ secrets.VMPT }}
          source: "dist/curriculo-angular/*"
          target: "/var/www/NewCurriculo"
          strip_components: 2 

      - name: Post-deploy commands (Permissions & Reload)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VMIP }}
          username: ${{ secrets.VMUSS }}
          key: ${{ secrets.VMPSS }}
          port: ${{ secrets.VMPT }}
          script: |
            sudo chown -R www-data:www-data /var/www/NewCurriculo
            sudo chmod -R 755 /var/www/NewCurriculo
            sudo systemctl reload apache2